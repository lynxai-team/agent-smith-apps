description: Talk in a debate for an agent
type: app
prompt: |-
    User question: "{question}".

    Here is the conversation history so far:

    ```
    {prompt}
    ```

    You search the web for information based on the leader's request.

    Question from the leader agent: {instructions}

    Search and provide the requested information
template:
  system: |-

    You are {name}. Your role is: {role}. You are in a debate with a team of agents about a question asked by the user. A leader agent is leading the debate. 
    Your mission is to help fullfilling the user request using your search habilities to provide information. 
    You don't talk to the user or other agents directly: you report to your leader.  
model: qwen4b
inferParams:
    top_k: 20
    top_p: 0.8
    min_p: 0.05
    temperature: 0.6
variables:
    required:
        question:
            description: the user question
        name:
            description: the model's name
        role:
            description: the model's role
        instructions:
            description: instructions from the leader agent
toolsList:
  - smsearch
  - open_webpage
  - wikipedia